name: Bug Report
description: Report a bug in Atomicmemory-core
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Start the server with `docker compose up`
        2. POST to /v1/memories/ingest with ...
        3. See error ...

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.

  - type: dropdown
    id: embedding-provider
    attributes:
      label: Embedding provider
      options:
        - openai
        - openai-compatible
        - ollama
        - transformers

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "22.x"

  - type: input
    id: postgres-version
    attributes:
      label: PostgreSQL version
      placeholder: "17 with pgvector"
