name: Feature Request
description: Suggest a new feature for Atomicmemory-core
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work?

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Does this belong in the core runtime or the research repo?
      options:
        - Core runtime (API, ingest, search, storage)
        - Research (benchmarks, eval, design exploration)
        - Not sure
